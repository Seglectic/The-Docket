<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Docket Overlay</title>
    <link rel="icon" type="image/svg+xml" href="/public/assets/favicon.svg" />
    <link rel="stylesheet" href="/client/overlay/styles.css" />
  </head>
  <body>
    <main class="overlay-shell">
      <header class="banner">
        <div id="stream-title">The Docket</div>
        <div id="viewer-line">Waiting for the next spin</div>
      </header>
      <section class="stage">
        <canvas id="wheel" width="1100" height="1100"></canvas>
        <div id="winner-stage" class="winner-stage hidden">
          <div id="winner-cover-shell" class="winner-cover-shell">
            <div id="winner-cover-art" class="winner-cover-art"></div>
            <div id="winner-cover-x" class="winner-cover-x">X</div>
          </div>
        </div>
        <div id="result-card" class="result-card hidden"></div>
      </section>
    </main>
    <script src="/client/overlay/spin-plan.js" defer></script>
    <script src="/client/overlay/app.js" defer></script>
  </body>
</html>
