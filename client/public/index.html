<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Docket</title>
    <link rel="icon" type="image/svg+xml" href="/public/assets/favicon.svg?v=0.7.4" />
    <link rel="stylesheet" href="/client/public/styles.css?v=0.7.4" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1 id="title">The Docket</h1>
        <p id="last-action">Live docket board</p>
      </header>
      <section id="override-panel" class="override-panel">
        <div class="override-panel__eyebrow">Current Override</div>
        <div id="override-current" class="override-panel__content">Wheel result is live</div>
      </section>
      <section class="board">
        <article class="column">
          <h2>In</h2>
          <div id="in-list" class="items"></div>
        </article>
        <article class="column">
          <h2>Out</h2>
          <div id="out-list" class="items"></div>
        </article>
        <article class="column column--override-pool">
          <h2>Override Pool</h2>
          <div id="override-list" class="items"></div>
        </article>
      </section>
    </main>
    <script src="/client/public/app.js?v=0.7.4" defer></script>
  </body>
</html>
