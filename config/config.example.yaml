server:
  host: 0.0.0.0
  port: 3030
storage:
  driver: "file"
  postgres:
    connectionString: ""
    ssl: true
auth:
  sharedSecret: "change-me"
twitch:
  enabled: false
  broadcasterLogin: ""
  scopes: "channel:read:redemptions"
  app:
    clientId: ""
    clientSecret: ""
    redirectUri: "http://localhost:3030/auth/twitch/callback"
  eventSub:
    transport: "websocket"
    reconnectGraceMs: 30000
    subscriptions:
      channelPointsCustomRewardRedemptionAdd: true
      channelPointsCustomRewardRedemptionUpdate: false
      channelPointsAutomaticRewardRedemptionAddV2: false
gameDatabase:
  enabled: false
  provider: "igdb"
  maxResults: 8
  igdb:
    clientId: ""
    clientSecret: ""
    imageSize: "cover_big_2x"
wheel:
  countdownSeconds: 10
  overlayTitle: "The Docket"
  physics:
    wheelMass: 1.20
    launchForce: 1.45
    drag: 0.12
    brakeStrength: 1.10
    minCruiseMs: 3800
    revealDelayMs: 1200
specialEntries:
  viewersChoice:
    enabled: true
    label: "Viewers Choice"
    baseWeight: 2
    wheelScope: "out"
  lockItIn:
    enabled: true
    label: "Lock It In"
    baseWeight: 2
    wheelScope: "in"
features:
  manualMode: true
  twitchEnabled: false
assets:
  restoreSound: ""
  eliminateSound: ""
  nextGameSound: ""
rewards:
  restore: "Docket Restoration"
  eliminate: "Docket Elimination!"
  addWeight: "Add Weight"
